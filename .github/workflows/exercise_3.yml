# Create a workflow that generates a repository health report to MAINTENANCE_LOG.md:
# - Runs the repository health report script located at actions/repo_health_report.sh. This adds a entry to MAINTENANCE_LOG.md
# - Uses peter-evans/create-pull-request@v7 to commit changes and create a PR to the repository
# - Is manually run

name: Repository Health Report

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1' # Every Monday at midnight UTC

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make script executable
        run: chmod +x ./actions/repo_health_report.sh

      - name: Run health report script
        run: ./actions/repo_health_report.sh

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update repository health report"
          branch: repo-health-report/automated
          delete-branch: true
          title: "🏥 Automated Repository Health Report"
          body: |
            This PR was automatically generated by the **Repository Health Report** workflow.

            It appends the latest health check results to `MAINTENANCE_LOG.md`.

            > Triggered on: ${{ github.event_name }}
          labels: |
            automated
            maintenance